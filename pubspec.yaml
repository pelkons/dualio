name: dualio
description: AI-first semantic memory inbox for saved links, screenshots, photos, and notes.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  cached_network_image: ^3.4.1
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  freezed_annotation: ^3.1.0
  go_router: ^16.2.0
  google_fonts: ^8.0.2
  image_picker: ^1.2.1
  intl: any
  json_annotation: ^4.11.0
  receive_sharing_intent: ^1.8.1
  share_plus: ^13.1.0
  supabase_flutter: ^2.12.2
  vibration: ^3.1.8

dev_dependencies:
  build_runner: ^2.14.1
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: design/icon.png
  adaptive_icon_background: "#F6F3EC"
  adaptive_icon_foreground: design/icon.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  generate: true
